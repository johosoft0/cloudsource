<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <meta name="description" content="CloudSource — Hyper-local crowd-sourced weather intelligence">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>CloudSource</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Anybody:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

  <!-- Geolocation Required Overlay -->
  <div id="geo-overlay" class="geo-overlay">
    <div class="geo-content">
      <span class="geo-icon">📍</span>
      <h2>Location Required</h2>
      <p id="geo-status">CloudSource needs your location to show nearby weather reports.</p>
      <button id="geo-retry" class="btn-primary hidden" style="margin-top:12px;">Try Again</button>
      <!-- TODO: REMOVE BEFORE PRODUCTION — zip code fallback for testing only -->
      <div id="geo-zip-fallback" class="geo-zip hidden">
        <p class="geo-zip-label">Or enter a zip code for testing:</p>
        <div class="geo-zip-row">
          <input id="geo-zip-input" type="text" maxlength="5" placeholder="29575" inputmode="numeric" pattern="[0-9]*">
          <button id="geo-zip-go" class="btn-primary btn-sm">Go</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Top Bar -->
  <header id="top-bar">
    <div class="top-bar-left">
      <span class="logo-icon">◐</span>
      <span class="logo-text">CloudSource</span>
    </div>
    <div id="current-conditions" class="top-bar-right">
      <span id="conditions-text">Loading...</span>
      <span id="conditions-temp"></span>
    </div>
  </header>

  <div id="map"></div>

  <!-- Radius toggle -->
  <div id="radius-toggle">
    <button class="radius-btn" data-miles="0.5">½ mi</button>
    <button class="radius-btn active" data-miles="5">5 mi</button>
    <button class="radius-btn" data-miles="10">10 mi</button>
  </div>

  <!-- Radar toggle -->
  <button id="btn-radar" class="radar-btn" aria-label="Toggle radar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
    </svg>
    <span>Radar</span>
  </button>

  <!-- FAB -->
  <button id="fab-report" aria-label="Submit weather report">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Profile button -->
  <button id="btn-profile" aria-label="Profile">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/>
    </svg>
  </button>

  <!-- Timeline -->
  <div id="timeline-panel">
    <div id="timeline-summary">Now — live reports</div>
    <div id="timeline-track">
      <input type="range" id="timeline-scrub" min="0" max="120" value="0" step="1">
      <div id="timeline-labels"><span>Now</span><span>1h ago</span><span>2h ago</span></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Report Submission Modal                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="report-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2>Report Conditions</h2>

      <div id="photo-section">
        <button id="btn-camera" type="button">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="4"/>
            <path d="M8 6V4.5A1.5 1.5 0 019.5 3h5A1.5 1.5 0 0116 4.5V6"/>
          </svg>
          <span>Add Photo</span>
        </button>
        <input type="file" id="photo-input" accept="image/*" capture="environment" hidden>
        <img id="photo-preview" class="hidden" alt="Preview">
        <div id="photo-gps-indicator" class="photo-gps hidden"></div>
      </div>

      <label class="field-label">Condition</label>
      <div id="condition-grid"></div>

      <label class="field-label">Intensity</label>
      <div id="intensity-bar">
        <input type="range" id="intensity-slider" min="1" max="5" value="3">
        <div id="intensity-labels"><span>Mild</span><span>Moderate</span><span>Severe</span></div>
      </div>

      <label class="field-label">Note <span class="char-count">0/140</span></label>
      <textarea id="report-note" maxlength="140" placeholder="What's it like out there?"></textarea>

      <div class="modal-actions">
        <button id="btn-cancel" type="button" class="btn-secondary">Cancel</button>
        <button id="btn-submit" type="button" class="btn-primary">Submit Report</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Report Detail Modal                                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="report-detail" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet modal-sheet-sm">
      <div class="modal-handle"></div>
      <div class="detail-photo-wrap">
        <img id="detail-photo" class="hidden" alt="Report photo">
        <button id="btn-flag-photo" class="flag-btn hidden" title="Report photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          <span>Report</span>
        </button>
      </div>
      <div id="detail-body">
        <div id="detail-condition"></div>
        <div id="detail-meta"></div>
        <div id="detail-note"></div>
        <div id="detail-user"></div>
      </div>
      <div id="detail-votes">
        <button id="btn-confirm" class="vote-btn" data-vote="confirm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Confirm</span> <span id="confirm-count" class="vote-count">0</span>
        </button>
        <button id="btn-deny" class="vote-btn" data-vote="deny">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Deny</span> <span id="deny-count" class="vote-count">0</span>
        </button>
      </div>
      <button id="btn-close-detail" class="btn-secondary" style="width:100%;margin-top:8px;">Close</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Profile / Auth Modal                               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <!-- Auth view (logged out) -->
      <div id="auth-view">
        <h2>Join CloudSource</h2>
        <p class="auth-subtitle">Sign in to submit reports and build your reputation.</p>
        <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
        <button id="btn-send-magic" class="btn-primary" style="width:100%">Send Magic Link</button>
        <p id="auth-status" class="auth-status"></p>
      </div>

      <!-- Profile view (logged in) -->
      <div id="profile-view" class="hidden">

        <!-- Header -->
        <div id="profile-header">
          <div id="profile-level-badge"></div>
          <div id="profile-info">
            <div class="profile-name-row">
              <h2 id="profile-name"></h2>
              <button id="btn-edit-name" class="edit-btn" title="Edit name">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
              </button>
            </div>
            <p id="profile-rep"></p>
          </div>
        </div>

        <!-- Inline name edit (hidden by default) -->
        <div id="name-edit-row" class="name-edit-row hidden">
          <input id="edit-name-input" type="text" maxlength="20" placeholder="New display name">
          <button id="btn-save-name" class="btn-primary btn-sm">Save</button>
          <button id="btn-cancel-edit" class="btn-secondary btn-sm">Cancel</button>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
          <button class="tab-btn active" data-tab="general">Profile</button>
          <button class="tab-btn" data-tab="reporter">Reporter</button>
          <button class="tab-btn" data-tab="community">Community</button>
        </div>

        <!-- Tab: General -->
        <div id="tab-general" class="tab-content">
          <div id="profile-stats"></div>
          <div id="profile-achievements"></div>
        </div>

        <!-- Tab: Reporter -->
        <div id="tab-reporter" class="tab-content hidden">
          <div id="reporter-content"></div>
        </div>

        <!-- Tab: Community -->
        <div id="tab-community" class="tab-content hidden">
          <div id="community-content"></div>
        </div>

        <button id="btn-signout" class="btn-secondary" style="width:100%;margin-top:16px;">Sign Out</button>
      </div>

      <!-- Always visible close -->
      <button id="btn-close-profile" class="btn-secondary" style="width:100%;margin-top:8px;">Close</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
